<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto Academy AI Agent</title>
    <!-- Import Font Futuristik -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #00f3ff; /* Cyan Neon */
            --secondary-color: #bc13fe; /* Purple Neon */
            --bg-dark: #050510;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --text-color: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-color) var(--bg-dark);
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(188, 19, 254, 0.2) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(0, 243, 255, 0.15) 0%, transparent 20%);
            font-family: 'Rajdhani', sans-serif;
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            letter-spacing: 2px;
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 5px 15px;
            border: 1px solid var(--primary-color);
            border-radius: 20px;
            color: var(--primary-color);
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        /* --- Main Container --- */
        .container {
            display: flex;
            flex: 1;
            height: calc(100vh - 80px);
        }

        /* --- Sidebar (AI Visual) --- */
        .sidebar {
            width: 350px;
            background: var(--glass-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        .ai-core {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary-color), transparent);
            box-shadow: 0 0 50px var(--primary-color), inset 0 0 20px var(--primary-color);
            animation: pulse 3s infinite ease-in-out;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ai-core::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            border: 2px solid var(--secondary-color);
            border-radius: 50%;
            animation: spin 10s linear infinite;
        }

        .ai-core::after {
            content: '';
            position: absolute;
            width: 180px;
            height: 180px;
            border: 1px dashed rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: spin-reverse 15s linear infinite;
        }

        .ai-info {
            margin-top: 40px;
            text-align: center;
        }

        .ai-info h2 {
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 10px;
        }

        .ai-info p {
            font-size: 0.9rem;
            color: #888;
        }

        /* --- Chat Area --- */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-messages {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 70%;
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 1rem;
            line-height: 1.5;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        .message.ai {
            align-self: flex-start;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-bottom-left-radius: 2px;
            color: var(--primary-color);
        }

        .message.user {
            align-self: flex-end;
            background: rgba(188, 19, 254, 0.2);
            border: 1px solid rgba(188, 19, 254, 0.4);
            border-bottom-right-radius: 2px;
            color: #fff;
        }

        /* --- Input Area --- */
        .input-area {
            padding: 30px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 15px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        button {
            padding: 0 30px;
            background: var(--primary-color);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: #fff;
            box-shadow: 0 0 20px var(--primary-color);
        }

        /* --- Footer --- */
        .ceo-footer {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            text-align: right;
        }

        .ceo-footer span {
            color: var(--secondary-color);
            font-weight: bold;
        }

        /* --- Animations --- */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        
        @keyframes spin-reverse {
            100% { transform: rotate(-360deg); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typing Indicator */
        .typing {
            display: none;
            color: var(--primary-color);
            font-size: 0.8rem;
            margin-left: 20px;
            margin-bottom: 10px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; height: 200px; padding: 10px; }
            .ai-core { width: 100px; height: 100px; }
            .ai-core::before { width: 80px; height: 80px; }
            .ai-info { display: none; }
            .chat-messages { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">PUNTO ACADEMY</div>
        <div class="status-badge">System Online</div>
    </header>

    <div class="container">
        <!-- Sidebar dengan Visual AI -->
        <aside class="sidebar">
            <div class="ai-core"></div>
            <div class="ai-info">
                <h2>AGENT PUNTO</h2>
                <p>Neural Network v4.0</p>
                <p style="margin-top:10px; color:var(--primary-color)">Processing...</p>
            </div>
        </aside>

        <!-- Area Chat Utama -->
        <main class="chat-area">
            <div class="chat-messages" id="chatBox">
                <div class="message ai">
                    Halo, Saya adalah AI Agent dari Punto Academy. Bagaimana saya bisa membantu visi Anda hari ini?
                </div>
            </div>
            
            <div class="typing" id="typingIndicator">Agent sedang mengetik...</div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Ketik perintah atau pertanyaan..." autocomplete="off">
                <button onclick="sendMessage()">Kirim</button>
            </div>

            <div class="ceo-footer">
                Developed for <span>Punto Academy</span> CEO<br>
                Powered by Future Tech
            </div>
        </main>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');

        // Database Jawaban Sederhana (Simulasi AI)
        const aiResponses = {
            "halo": "Salam hormat, CEO. Sistem Punto Academy siap melayani.",
            "siapa kamu": "Saya adalah Agent AI Punto Academy, asisten cerdas yang dirancang untuk efisiensi maksimal.",
            "ceo": "CEO Punto Academy adalah pemimpin visioner yang membawa perusahaan ke masa depan teknologi.",
            "punto": "Punto Academy adalah pusat inovasi teknologi masa depan.",
            "default": "Maaf, saya masih memproses data tersebut. Bisakah Anda menjelaskan lebih detail?"
        };

        // Fungsi Mengirim Pesan
        function sendMessage() {
            const text = userInput.value.trim();
            if (text === "") return;

            // 1. Tampilkan pesan user
            addMessage(text, 'user');
            userInput.value = '';

            // 2. Simulasi AI Berpikir (Delay)
            showTyping();

            setTimeout(() => {
                hideTyping();
                const response = getAIResponse(text);
                addMessage(response, 'ai');
            }, 1500); // Delay 1.5 detik
        }

        // Fungsi Menambahkan Bubble Chat ke Layar
        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.classList.add('message', sender);
            div.innerText = text;
            chatBox.appendChild(div);
            
            // Auto scroll ke bawah
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Logika Respon AI Sederhana
        function getAIResponse(input) {
            input = input.toLowerCase();
            
            for (let key in aiResponses) {
                if (input.includes(key)) {
                    return aiResponses[key];
                }
            }
            return aiResponses["default"];
        }

        function showTyping() {
            typingIndicator.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function hideTyping() {
            typingIndicator.style.display = 'none';
        }

        // Kirim dengan tombol Enter
        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
